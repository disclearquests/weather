<html>
    <head>
        <title>WeatherApp</title>
        <link rel="stylesheet" href="weatherstyle.css">
    </head>
    <body>
        <div class="card">
            <form id="search">
                <input id="input" placeholder="Enter City Name">
                <button id="button" type="submit">Search</button>
            </form> 
            <div class="weather">
                <img src="https://openweathermap.org/img/wn/02d@2x.png" alt="weathericon" id="weathericon">
                <h2 id="city">WeatherApp</h2>
                <h2 id="temperature"></h2>
                <h2 id="desc"></h2>
                <h3 id="humidity"></h3>
                <h3 id="windspeed"></h3>
            </div>
        </div>
        <script src="weatherlogic.js"></script>
    </body>
</html>
